name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake swig python3-dev libmbedtls-dev curl git

      # Cache the cloned + built libIEC61850 (pinned) so CI is fast after the
      # first run. Key on the build script so a dependency bump rebuilds.
      - name: Cache libIEC61850
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/10_build.sh') }}

      - name: Build (libIEC61850 pinned + tools)
        run: ./scripts/10_build.sh

      - name: Self-test (validate configs, unit + interop tests, headless smoke)
        run: ./scripts/70_selftest.sh

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build documentation (warnings are errors)
        run: |
          python -m pip install -r docs/requirements.txt
          sphinx-build -W -b html docs docs/_build/html
      - uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
