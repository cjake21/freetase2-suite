# Bilateral table: per-peer data scoping, enforced by the server with -B.
#
# A TASE.2 bilateral table is the agreement between two control centres that says
# which data each may see and command. With this file the server enforces it: each
# peer (matched by source IP) gets one rule, and reads, controls, injections, and
# Block 2 report members outside that rule are denied or withheld.
#
# Columns:  peer_ip   rights   objects
#   rights   any of r (read and subscribe), c (control/operate), w (write/inject)
#   objects  a comma-separated list of point names, "prefix*" patterns, or "*"
#            (a rule listing "plc1_brk" also covers its control object plc1_brk_ctl)
#
# A peer with no rule here is denied all data objects (default deny). Metadata
# (version, supported features, bilateral table id, transfer-set objects) stays
# readable so a partner can still associate and discover the model.

# The local suite components (ingest gateway, HMI bridge, scenario, physics) all
# run on loopback and need full access.
127.0.0.1   rcw   *

# --- example partner control centres (edit for your federation) ---
# Partner A reads Feeder Bay 1 and the tie line, but cannot command anything.
10.0.0.10   r     plc1_*
# Partner B reads Feeder Bay 2 and may operate its own breaker.
10.0.0.11   rc    plc2_*
# A DNP3-fed partner reads only the RTU points.
10.0.0.12   r     rtu1_*
