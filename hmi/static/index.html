<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREE TASE2 SUITE - ICCP/SCADA HMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/hmi.css">
</head>
<body>

<!-- appliance runtime header -->
<header class="appliance">
  <div class="nameplate">
    <div class="pn">FREE TASE2 SUITE</div>
    <div class="ps">ICCP / SCADA HMI Runtime</div>
  </div>
  <div class="hblock state">
    <div class="hk">Link State</div>
    <div class="hv"><span class="lamp" id="hb-lamp"></span><span id="hb-link">OFFLINE</span></div>
  </div>
  <div class="hblock"><div class="hk">Stations</div><div class="hv num" id="hb-stations">0/0</div></div>
  <div class="hblock"><div class="hk">Scan</div><div class="hv" id="hb-scan" style="font-size:16px">HOLD</div></div>
  <div class="hblock alm"><div class="hk">Critical</div><div class="hv num" id="hb-crit">0</div></div>
  <div class="hblock alm"><div class="hk">Warning</div><div class="hv num" id="hb-warn">0</div></div>
  <div class="hsp"></div>
  <div class="hblock"><div class="hk">Last Report</div><div class="hv num" id="hb-rpt" style="font-size:16px">--:--:--</div></div>
  <div class="hblock"><div class="hk">UTC</div><div class="hv num" id="hb-clock" style="font-size:17px">--:--:--</div></div>
</header>

<!-- station mimic strip -->
<section class="mimic" id="mimic"></section>

<!-- active alarm rail (priority) -->
<section class="alarmrail" id="alarmrail"></section>

<div class="workspace">
  <!-- points / telemetry -->
  <section class="panel points">
    <div class="bezel">
      <span class="bz-title">Points / Telemetry</span>
      <span class="filters">
        <input type="text" id="flt-search" class="inp" placeholder="filter">
        <select id="flt-station" class="inp"></select>
        <select id="flt-quality" class="inp">
          <option value="">quality: any</option>
          <option value="good">good</option>
          <option value="bad">not good</option>
        </select>
        <label class="chk"><input type="checkbox" id="flt-ctl"> ctrl</label>
        <span class="count num" id="pt-count">0</span>
      </span>
    </div>
    <div class="table-wrap">
      <table class="grid">
        <thead><tr>
          <th></th><th data-sort="name">Point</th><th data-sort="label">Description</th>
          <th data-sort="value" class="num">Value</th><th data-sort="quality">Quality</th>
          <th data-sort="control">Ctl</th><th data-sort="age" class="num">Age</th>
        </tr></thead>
        <tbody id="pts-body"></tbody>
      </table>
    </div>
  </section>

  <!-- right column: alarms then control bay -->
  <aside class="side">
    <section class="panel alarms">
      <div class="bezel"><span class="bz-title alarm">Active Alarms</span><button class="opbtn sm" id="ackbtn">Ack</button></div>
      <div class="alarm-list" id="alarm-body"></div>
    </section>
    <section class="panel controlbay">
      <div class="bezel"><span class="bz-title">Instrument Detail</span></div>
      <div id="detail" class="bay-body"><div class="empty">No point selected</div></div>
    </section>
  </aside>
</div>

<!-- event recorder strip -->
<section class="recorder">
  <div class="rec-hd">
    <span class="rl">Event Recorder</span>
    <span class="evfilters" id="evfilters">
      <button class="lf on" data-ev="ALL">All</button>
      <button class="lf" data-ev="ALM">Alarm</button>
      <button class="lf" data-ev="CMD">Cmd</button>
      <button class="lf" data-ev="RX">Rx</button>
      <button class="lf" data-ev="SYS">Sys</button>
    </span>
  </div>
  <div class="log" id="event-body"></div>
</section>

<script src="/static/hmi.js"></script>
</body>
</html>
