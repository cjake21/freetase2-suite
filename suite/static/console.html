<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREE TASE2 SUITE - Runtime Controller</title>
<style>
:root{
  --font-ui:"Bahnschrift","DIN Alternate","Aptos Narrow","Arial Narrow",sans-serif;
  --font-data:"Cascadia Mono","IBM Plex Mono","Consolas",monospace;
  --bg-main:#1f2423; --bg-panel:#292f2e; --bg-deep:#161a19; --bg-slot:#2c3331;
  --line-hard:#56615e; --line-soft:#3a4340; --line-black:#0d100f;
  --text-main:#e5e1d6; --text-muted:#9ba69f; --text-dim:#68746f;
  --run:#4fb36a; --armed:#d8a22a; --fault:#d64a36; --dark:#5a6360; --control:#6d94a8;
  --alarm-bg:#3a201d; --warn-bg:#332b19;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:var(--bg-main);color:var(--text-main);font-family:var(--font-ui);font-size:15px;
  display:flex;flex-direction:column;min-height:100vh;}
.value,.timestamp,.path,.command,.log,.port,.protocol-raw,.data{font-family:var(--font-data);}

/* ===== appliance header ===== */
.appliance{display:flex;align-items:stretch;background:linear-gradient(180deg,#2b302f,#202524);
  border-bottom:3px solid var(--line-black);box-shadow:inset 0 1px 0 #ffffff10,0 2px 5px #0007;}
.ident{display:flex;flex-direction:column;justify-content:center;padding:0 20px;
  background:linear-gradient(180deg,#241009,#19120f);border-right:3px solid var(--line-black);min-width:230px;}
.ident .pn{font-weight:700;font-size:23px;letter-spacing:.1em;color:#f3eee2;text-shadow:0 1px 0 #000;}
.ident .ps{font-size:11px;letter-spacing:.22em;color:var(--armed);text-transform:uppercase;margin-top:2px;}
/* center: compact status rail (annunciator, not KPI boxes) */
.statrail{flex:1;display:flex;align-items:center;gap:13px;padding:0 20px;overflow:hidden;white-space:nowrap;
  background:linear-gradient(180deg,#232927,#1b201f);border-right:1px solid var(--line-soft);
  font-family:var(--font-data);font-size:12.5px;color:var(--text-muted);}
.srlamp{width:13px;height:13px;border-radius:50%;background:#141817;border:1px solid #0c0f0e;
  box-shadow:inset 0 0 3px #000;flex:0 0 13px;}
.srlamp.run{background:radial-gradient(circle at 35% 30%,#9be8ad,#2f9c4f);box-shadow:0 0 7px #4fb36a;}
.srlamp.armed{background:radial-gradient(circle at 35% 30%,#f1cf7a,#b9851d);box-shadow:0 0 7px #d8a22a;}
.sr-seg{display:flex;align-items:center;gap:7px;min-width:0;}
.sr-dep{color:var(--text-main);letter-spacing:.04em;}
.sr-st{font-family:var(--font-ui);font-size:11px;letter-spacing:.14em;text-transform:uppercase;}
.sr-st.run{color:var(--run);} .sr-st.armed{color:var(--armed);} .sr-st.off{color:var(--dark);}
.sr-k{color:var(--text-dim);text-transform:uppercase;font-family:var(--font-ui);font-size:10.5px;letter-spacing:.1em;}
.sr-prof-i{color:var(--armed);} .sr-prof-h{color:var(--run);}
.sr-sep{width:1px;height:18px;background:var(--line-soft);flex:0 0 1px;}
.sr-clk{margin-left:auto;color:var(--text-muted);padding-left:8px;}
.hlinks{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid var(--line-soft);}
.linkbtn{font-family:var(--font-ui);font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);
  text-decoration:none;padding:8px 13px;border:1px solid var(--line-hard);background:linear-gradient(#333a38,#262c2b);}
.linkbtn:hover{color:var(--text-main);border-color:#7a857f;} .linkbtn.off{opacity:.3;pointer-events:none;}
/* protected STOP ALL zone */
.estop{display:flex;align-items:center;background:repeating-linear-gradient(45deg,#2a201a,#2a201a 10px,#231a15 10px,#231a15 20px);
  padding:0 6px;border-left:3px solid var(--line-black);}
.estop button{height:74%;min-width:150px;border:2px solid #6a1f17;border-radius:3px;cursor:pointer;
  font-family:var(--font-ui);font-weight:700;font-size:17px;letter-spacing:.1em;text-transform:uppercase;color:#fff0ec;
  background:linear-gradient(180deg,#d64a36,#9c3527);text-shadow:0 1px 0 #00000070;
  box-shadow:inset 0 2px 0 #ffffff25,inset 0 -3px 7px #00000060,0 2px 4px #0006;padding:0 16px;}
.estop button:hover{background:linear-gradient(180deg,#e2543f,#a83a2b);}
.estop button:active{box-shadow:inset 0 3px 8px #00000080;}
.estop button:disabled{background:linear-gradient(180deg,#473a37,#3a302d);color:#857571;border-color:#3a302d;
  box-shadow:inset 0 1px 0 #ffffff08;cursor:not-allowed;}

/* ===== layout ===== */
.bay{display:grid;grid-template-columns:1.3fr 1fr;flex:1;min-height:0;border-bottom:3px solid var(--line-black);}
@media(max-width:1040px){.bay{grid-template-columns:1fr;}}
.rack{background:var(--bg-deep);border-right:3px solid var(--line-black);overflow:auto;padding:12px;}
.rack-lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);padding:2px 2px 12px;
  display:flex;justify-content:space-between;}

/* category grouping (so a user finds the right deployment fast) */
.cat-hd{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:15px 4px 9px;border-bottom:1px solid var(--line-soft);margin-bottom:11px;}
.cat-hd:first-child{padding-top:2px;}
.cat-l{font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-main);}
.cat-d{font-size:11.5px;color:var(--text-dim);letter-spacing:.02em;}
.slot-use{font-size:12.5px;color:var(--text-muted);margin-top:5px;letter-spacing:.01em;}
/* post-run tools (capabilities that are not deployments) */
.tool{background:linear-gradient(180deg,#222827,#1b201f);border:1px solid var(--line-soft);border-left:3px solid var(--control);
  padding:9px 12px;margin-bottom:9px;}
.tool-n{font-size:14px;font-weight:600;color:#dfe7e1;letter-spacing:.02em;margin-bottom:4px;}
.tool-c{font-family:var(--font-data);font-size:12px;color:#a9cfe0;background:#101413;border:1px solid var(--line-black);padding:5px 8px;display:block;}
.tool-d{font-size:11.5px;color:var(--text-dim);margin-top:4px;}

/* ===== runtime slots ===== */
.slot{display:grid;grid-template-columns:46px 10px 1fr auto;margin-bottom:11px;background:linear-gradient(180deg,#262c2b,#1e2322);
  border:1px solid var(--line-soft);box-shadow:inset 0 1px 0 #ffffff07,0 1px 3px #0006;cursor:pointer;}
.slot-no{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#1a1f1e,#13171 6);
  background:linear-gradient(180deg,#1a1f1e,#131716);border-right:1px solid var(--line-black);box-shadow:inset 0 0 0 1px #ffffff06;}
.slot-no .sn{font-family:var(--font-data);font-size:21px;font-weight:600;color:#cdd4cf;letter-spacing:.04em;}
.slot-no .sl{font-size:9px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;}
/* power rail / breaker indicator */
.slot-rail{position:relative;background:#1a0f0c;box-shadow:inset -1px 0 0 #00000060;}
.slot-rail::before{content:"";position:absolute;left:2px;right:2px;top:50%;height:18px;transform:translateY(-50%);
  background:#3a201d;border:1px solid #000;}  /* breaker contact, open by default */
.slot.run .slot-rail{background:linear-gradient(180deg,#5fd07f,#2f9c4f);box-shadow:0 0 9px #4fb36a99;}
.slot.run .slot-rail::before{background:#1d5a32;border-color:#0c2f1a;}  /* breaker closed */
.slot.armed .slot-rail{background:#3a2f12;} .slot.armed .slot-rail::before{background:#6b5414;}
.slot.fault .slot-rail{background:#3a1714;} .slot.fault .slot-rail::before{background:#6a1f17;}
.slot.run{border-color:#3f6a4d;box-shadow:inset 0 1px 0 #ffffff10,0 0 0 1px #4fb36a25,0 2px 6px #0006;background:linear-gradient(180deg,#27332c,#1f2823);}
.slot.fault{border-color:#6a352c;}
.slot.sel{outline:2px solid var(--text-main);outline-offset:-2px;}
.slot-body{padding:10px 13px;min-width:0;}
.slot-top{display:flex;align-items:center;gap:10px;}
.slamp{width:12px;height:12px;border-radius:50%;background:#14181 7;background:#141817;border:1px solid #0c0f0e;box-shadow:inset 0 0 3px #000;flex:0 0 12px;}
.slamp.run{background:radial-gradient(circle at 35% 30%,#9be8ad,#2f9c4f);box-shadow:0 0 7px #4fb36a;}
.slamp.armed{background:radial-gradient(circle at 35% 30%,#f1cf7a,#b9851d);box-shadow:0 0 7px #d8a22a;}
.slamp.fault{background:radial-gradient(circle at 35% 30%,#f3a294,#b53322);box-shadow:0 0 8px #d64a36;animation:bk 1.1s steps(1) infinite;}
@keyframes bk{50%{box-shadow:0 0 2px #d64a3640;}}
.slot-name{font-size:19px;font-weight:700;letter-spacing:.03em;color:#f3eee2;}
.slot-state{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
.slot.run .slot-state{color:var(--run);} .slot.armed .slot-state{color:var(--armed);}
.slot.fault .slot-state{color:var(--fault);} .slot.dark .slot-state{color:var(--dark);}
.plates{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 6px;}
.plate{font-size:11.5px;letter-spacing:.05em;color:var(--text-muted);padding:1px 8px;background:var(--bg-deep);
  border:1px solid var(--line-soft);box-shadow:inset 0 1px 1px #00000050;text-transform:uppercase;}
.plate b{color:var(--text-dim);font-weight:400;margin-right:5px;}
.plate.hardened{color:#bfe6c9;border-color:#3f6a4d;} .plate.insecure{color:#e9cf94;border-color:#6a5a2b;}
.slot-meta{font-family:var(--font-data);font-size:11.5px;color:var(--text-dim);}
.slot-meta b{color:var(--text-muted);font-weight:400;}
.slot-ctrls{display:flex;flex-direction:column;justify-content:center;gap:6px;padding:10px 11px;border-left:1px solid var(--line-soft);background:#0000001a;}

/* operator controls */
.opbtn{font-family:var(--font-ui);font-weight:600;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
  min-width:72px;padding:8px 12px;color:var(--text-main);cursor:pointer;border:1px solid #131817;border-top-color:#4d574f;
  background:linear-gradient(180deg,#3a423f,#2b322f);box-shadow:inset 0 1px 0 #ffffff10,0 2px 0 #151917,0 3px 4px #00000050;}
.opbtn:hover{background:linear-gradient(180deg,#414a46,#313836);}
.opbtn:active{transform:translateY(2px);box-shadow:inset 0 2px 5px #00000070;}
.opbtn:disabled{opacity:.4;cursor:not-allowed;}
.opbtn.start{color:#e2f5e7;background:linear-gradient(180deg,#3f9457,#2c6e40);border-top-color:#5cc077;}
.opbtn.stop{color:#f7e2de;background:linear-gradient(180deg,#bc4636,#8f3327);border-top-color:#dc5a47;}

/* ===== control bay ===== */
.cbay{background:var(--bg-panel);overflow:auto;}
.cbay-empty{color:var(--text-dim);padding:24px;}
.cbay-hd{background:linear-gradient(180deg,#241009,#19120f);border-bottom:3px solid var(--line-black);padding:13px 18px;}
.cbay-hd .nm{font-size:22px;font-weight:700;letter-spacing:.05em;color:#f3eee2;}
.cbay-hd .ds{font-size:13px;color:var(--text-muted);margin-top:3px;}
/* industrial section separator + label */
.sect{display:flex;align-items:center;gap:10px;background:#1c2120;border-top:1px solid var(--line-black);
  border-bottom:1px solid var(--line-soft);padding:6px 16px;}
.sect .sx{width:8px;height:14px;background:var(--line-hard);}
.sect .st{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);font-weight:600;}
.sect.warn{background:#2a2113;border-bottom-color:var(--armed);} .sect.warn .sx{background:var(--armed);} .sect.warn .st{color:#f1d79a;}
/* command strip */
.cmdstrip{display:flex;align-items:center;gap:0;background:#101413;border:1px solid var(--line-black);margin:12px 16px;
  box-shadow:inset 0 1px 4px #000;}
.cmdstrip .ct{background:#2c6e40;color:#e2f5e7;font-weight:700;font-size:11px;letter-spacing:.14em;padding:9px 11px;text-transform:uppercase;}
.cmdstrip .cc{font-family:var(--font-data);font-size:13px;color:#a9e6ba;padding:9px 12px;overflow:auto;white-space:nowrap;}
/* config/ports readouts */
.kvs{padding:4px 16px 12px;}
.kv{display:flex;gap:12px;padding:4px 0;font-family:var(--font-data);font-size:12.5px;}
.kv .k{color:var(--text-dim);min-width:96px;text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-ui);font-size:11px;}
.kv .v{color:var(--text-main);}
/* health checklist */
.chk{display:flex;align-items:center;gap:12px;padding:7px 16px;border-bottom:1px solid var(--line-soft);}
.chk .led{width:11px;height:11px;border-radius:2px;flex:0 0 11px;box-shadow:inset 0 0 2px #000;}
.chk .led.ok{background:radial-gradient(circle at 35% 30%,#9be8ad,#2f9c4f);box-shadow:0 0 5px #4fb36a88;}
.chk .led.bad{background:radial-gradient(circle at 35% 30%,#f3a294,#b53322);box-shadow:0 0 5px #d64a36aa;}
.chk .cl{flex:1;font-size:14px;} .chk .cd{font-family:var(--font-data);font-size:11.5px;color:var(--text-dim);}
/* annunciator warning rows */
.ann{display:grid;grid-template-columns:34px 1fr;align-items:center;border-bottom:1px solid var(--line-black);
  background:var(--warn-bg);color:#f1d79a;}
.ann.crit{background:var(--alarm-bg);color:#f0bbb4;}
.ann .annl{align-self:stretch;display:flex;align-items:center;justify-content:center;background:#00000028;border-right:1px solid #00000040;}
.ann .anndot{width:11px;height:11px;border-radius:50%;background:var(--armed);box-shadow:0 0 6px var(--armed);}
.ann.crit .anndot{background:var(--fault);box-shadow:0 0 7px var(--fault);animation:bk 1.1s steps(1) infinite;}
.ann .annt{padding:9px 14px;font-size:13.5px;line-height:1.4;}

/* ===== event recorder ===== */
.recorder{background:var(--bg-deep);}
.rec-hd{display:flex;align-items:center;justify-content:space-between;background:#20.2524;background:#202524;
  border-bottom:1px solid var(--line-soft);padding:5px 14px;}
.rec-hd .rl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);}
.logfilters{display:flex;border:1px solid var(--line-hard);}
.lf{font-family:var(--font-ui);font-weight:600;font-size:12px;letter-spacing:.05em;text-transform:uppercase;
  padding:4px 12px;background:#262c2b;color:var(--text-dim);border:none;border-right:1px solid var(--line-soft);cursor:pointer;}
.lf:last-child{border-right:none;} .lf.on{background:var(--line-hard);color:#fff;}
.log{font-family:var(--font-data);font-size:12px;line-height:1.55;height:190px;overflow:auto;background:#121514;padding:5px 0;}
.logline{display:grid;grid-template-columns:5px 80px 1fr;padding:1px 0;}
.logline .lr{background:var(--line-soft);}
.logline.err .lr{background:var(--fault);} .logline.warn .lr{background:var(--armed);} .logline.sys .lr{background:var(--control);}
.logline .lt{color:var(--text-dim);padding-left:10px;} .logline .lm{padding-right:12px;white-space:pre-wrap;color:#aeb7af;}
.logline.err .lm{color:#f08a80;} .logline.warn .lm{color:#e8c879;}
.note{color:var(--text-dim);font-size:12.5px;padding:8px 4px;}
</style>
</head>
<body>
<header class="appliance">
  <div class="ident"><div class="pn">FREE TASE2 SUITE</div><div class="ps">SCADA Runtime Controller</div></div>
  <div class="statrail" id="statrail">
    <span class="srlamp" id="rt-lamp"></span>
    <span id="rt-ctx" style="display:flex;align-items:center;gap:13px;flex:1;min-width:0;"></span>
  </div>
  <div class="hlinks">
    <a id="hmi-link" class="linkbtn off" href="#" target="_blank">SCADA HMI</a>
    <a id="docs-link" class="linkbtn" href="/docs/" target="_blank">Docs</a>
  </div>
  <div class="estop"><button id="estop" disabled>&#9632; Stop All</button></div>
</header>

<div class="bay">
  <section class="rack">
    <div class="rack-lbl"><span>Runtime Slots</span><span class="data" id="rack-count"></span></div>
    <div id="rack"></div>
    <p class="note">One slot energized at a time (shared ports). DARK = unpowered, ARMED = checks passed, RUNNING = energized, FAULTED = pre-launch checks failed.</p>
  </section>
  <aside class="cbay" id="cbay"><div class="cbay-empty">Select a slot to open its control bay.</div></aside>
</div>

<section class="recorder">
  <div class="rec-hd">
    <span class="rl">Event Recorder</span>
    <span style="display:flex;align-items:center;gap:10px">
      <span class="logfilters" id="logfilters">
        <button class="lf on" data-f="ALL">All</button><button class="lf" data-f="SYSTEM">System</button>
        <button class="lf" data-f="RUNTIME">Runtime</button><button class="lf" data-f="ERROR">Error</button>
      </span><span class="rl data" id="rec-state">idle</span>
    </span>
  </div>
  <div class="log" id="log"></div>
</section>

<script>
"use strict";
let deps={}, order=[], status={running:false}, runs={}, prechecks={}, sel=null, logFilter="ALL";
const $=id=>document.getElementById(id);
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
async function api(p,b){const o=b?{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}:{};return (await fetch(p,o)).json();}
function scriptFor(d){return ({simulation:"scripts/50_run_hmi.sh",ingestion:"scripts/55_run_scada.sh",scenario:"scripts/56_run_scenario.sh",physics:"scripts/57_run_physics.sh"})[d.mode]||"scripts/55_run_scada.sh";}
function portsFor(d){const p=["TASE.2/"+(d.tase2_port||10502),"HMI/"+(d.http_port||8800)];if((d.sims||[]).includes("modbus"))p.push("MODBUS/1502");if((d.sims||[]).includes("dnp3"))p.push("DNP3/20000");return p;}
function slotState(name){
  if(status.running&&status.name===name) return "run";
  const pc=prechecks[name];
  if(pc&&!pc.ok) return "fault";
  if(sel===name) return "armed";
  return "dark";
}
const STWORD={run:"Running",armed:"Armed",fault:"Faulted",dark:"Dark"};

function renderHeader(){
  const r=status.running, ins=status.security==="insecure";
  $("rt-lamp").className="srlamp "+(r?(ins?"armed":"run"):"");
  const sep=`<span class="sr-sep"></span>`;
  let segs=[];
  if(r){
    segs.push(`<span class="sr-seg"><span class="sr-dep data">${esc(status.name)}</span><span class="sr-st ${ins?"armed":"run"}">energized</span></span>`);
    segs.push(sep+`<span class="sr-seg">${esc(status.protocol||"")} ${esc(status.mode||"")}</span>`);
    segs.push(sep+`<span class="sr-seg"><span class="sr-k">profile</span><span class="${ins?"sr-prof-i":"sr-prof-h"}">${esc(status.security||"")}</span></span>`);
  } else {
    segs.push(`<span class="sr-seg"><span class="sr-st off">no deployment energized</span></span>`);
  }
  segs.push(sep+`<span class="sr-seg"><span class="sr-k">slots</span>${order.length} / ${r?1:0} active</span>`);
  segs.push(`<span class="sr-clk data" id="hclk">${clk()}</span>`);
  $("rt-ctx").innerHTML=segs.join("");
  $("estop").disabled=!r;
  const hmi=$("hmi-link");
  if(r&&status.http_port&&status.hmi_ready){
    hmi.href="http://"+location.hostname+":"+status.http_port+"/";
    hmi.classList.remove("off");hmi.textContent="SCADA HMI";
  } else if(r&&status.http_port){
    hmi.classList.add("off");hmi.textContent="SCADA HMI · starting";
  } else { hmi.classList.add("off");hmi.textContent="SCADA HMI"; }
  $("docs-link").classList.toggle("off",!status.docs_available);
}
const CATS=[
  {id:"demos",   label:"Demos & Training",     desc:"See it work. Synthetic or real data, nothing scripted."},
  {id:"attack",  label:"Attack Scenarios",     desc:"Scripted, repeatable attacks. These feed the dataset and scoring tools."},
  {id:"defense", label:"Defense & Federation", desc:"Encryption, command allowlist, and per-peer bilateral scoping."},
  {id:"hardware",label:"Physical Testbed",     desc:"Real PLCs and RTUs."}
];
function slotHtml(name,i){
  const d=deps[name], s=slotState(name), no=String(i).padStart(2,"0");
  return `<div class="slot ${s} ${sel===name?"sel":""}" data-name="${esc(name)}">
    <div class="slot-no"><div class="sn">${no}</div><div class="sl">Slot</div></div>
    <div class="slot-rail"></div>
    <div class="slot-body">
      <div class="slot-top"><span class="slamp ${s}"></span><span class="slot-name">${esc(name)}</span><span class="slot-state">${STWORD[s]}</span></div>
      ${d.use_when?`<div class="slot-use">${esc(d.use_when)}</div>`:""}
      <div class="plates">
        <span class="plate"><b>proto</b>${esc(d.protocol||"ICCP")}</span>
        <span class="plate"><b>mode</b>${esc(d.mode||"")}</span>
        <span class="plate ${d.security}"><b>profile</b>${esc(d.security||"insecure")}</span>
      </div>
      <div class="slot-meta"><b>cfg</b> ${esc((d.config||"").split("/").pop())} &nbsp; <b>ports</b> ${esc(portsFor(d).join(" "))}</div>
    </div>
    <div class="slot-ctrls">
      ${s==="run"?`<button class="opbtn stop" data-stop="1">Stop</button>`
                 :`<button class="opbtn start" data-start="${esc(name)}" ${status.running?"disabled":""}>Start</button>`}
      <button class="opbtn" data-logs="${esc(name)}">Logs</button>
    </div>
  </div>`;
}
function toolsHtml(){
  return `<div class="cat-hd"><span class="cat-l">Data &amp; Detection</span><span class="cat-d">After a run: capture, label, and grade. Run these from a terminal.</span></div>
    <div class="tool"><div class="tool-n">Build a labelled dataset</div><span class="tool-c command">sudo ./scripts/58_run_dataset.sh</span><div class="tool-d">Capture a scenario run and label every window benign or malicious with a technique tag.</div></div>
    <div class="tool"><div class="tool-n">Score a detector</div><span class="tool-c command">./scripts/59_score.sh datasets/&lt;run&gt;</span><div class="tool-d">Grade a sensor's alerts against the ground truth: recall per technique, time to detect, false positives.</div></div>`;
}
function renderRack(){
  $("rack-count").textContent=order.length+" slots";
  const byCat={}; order.forEach(n=>{const c=(deps[n]&&deps[n].category)||"other";(byCat[c]=byCat[c]||[]).push(n);});
  const known=CATS.map(c=>c.id);
  const catOrder=known.filter(c=>byCat[c]).concat(Object.keys(byCat).filter(c=>!known.includes(c)));
  let i=0, html="";
  catOrder.forEach(cid=>{
    const meta=CATS.find(c=>c.id===cid)||{label:cid,desc:""};
    html+=`<div class="cat-hd"><span class="cat-l">${esc(meta.label)}</span><span class="cat-d">${esc(meta.desc)}</span></div>`;
    byCat[cid].forEach(name=>{ html+=slotHtml(name, ++i); });
  });
  html+=toolsHtml();
  $("rack").innerHTML=html;
  $("rack").querySelectorAll(".slot").forEach(el=>el.onclick=e=>{if(e.target.closest("button"))return;sel=el.dataset.name;renderRack();renderBay();});
  $("rack").querySelectorAll("button[data-start]").forEach(b=>b.onclick=async()=>{b.disabled=true;status=await api("/api/start",{name:b.dataset.start});sel=b.dataset.start;await loadPrecheck(b.dataset.start);await refresh();});
  $("rack").querySelectorAll("button[data-stop]").forEach(b=>b.onclick=async()=>{b.disabled=true;status=await api("/api/stop",{});await refresh();});
  $("rack").querySelectorAll("button[data-logs]").forEach(b=>b.onclick=()=>{sel=b.dataset.logs;renderRack();renderBay();$("log").scrollIntoView({behavior:"smooth"});});
}
function renderBay(){
  const d=deps[sel];
  if(!d){$("cbay").innerHTML='<div class="cbay-empty">Select a slot to open its control bay.</div>';$("cbay").dataset.key="";return;}
  const on=status.running&&status.name===sel, pc=prechecks[sel];
  const key=sel+"|"+(on?1:0)+"|"+(pc?pc.ok:"?")+"|"+((status.name===sel&&status.last_run)||runs[sel]||"");
  if($("cbay").dataset.key===key)return; $("cbay").dataset.key=key;
  let h=`<div class="cbay-hd"><div class="nm">${esc(sel)}</div><div class="ds">${esc(d.description||"")}</div></div>`;
  h+=sect("Command");
  h+=`<div class="cmdstrip"><span class="ct">Run</span><span class="cc command">python3 suite/tase2ctl.py run ${esc(sel)}</span></div>`;
  h+=sect("Config");
  h+=`<div class="kvs">
    <div class="kv"><span class="k">Script</span><span class="v path">${esc(scriptFor(d))}</span></div>
    <div class="kv"><span class="k">Config</span><span class="v path">${esc(d.config||"")}</span></div>
    ${d.tags?`<div class="kv"><span class="k">Tags</span><span class="v path">${esc(d.tags)}</span></div>`:""}
    <div class="kv"><span class="k">Profile</span><span class="v" style="color:${d.security==="hardened"?"var(--run)":"var(--armed)"}">${esc((d.security||"").toUpperCase())}</span></div>
    <div class="kv"><span class="k">Last run</span><span class="v timestamp">${esc((status.name===sel&&status.last_run)||runs[sel]||"never")}</span></div>
  </div>`;
  h+=sect("Ports");
  h+=`<div class="kvs">`+portsFor(d).map(p=>`<div class="kv"><span class="k">Bind</span><span class="v port">${esc(p)}</span></div>`).join("")+`</div>`;
  h+=sect("Health");
  if(pc){ h+=pc.data.checks.map(c=>`<div class="chk"><span class="led ${c.ok?"ok":"bad"}"></span><span class="cl">${esc(c.label)}</span><span class="cd">${esc(c.detail)}</span></div>`).join(""); }
  else h+=`<div class="chk"><span class="led bad"></span><span class="cl">checks pending</span></div>`;
  if(pc&&pc.data.warnings.length){
    h+=sect("Warnings",true);
    h+=pc.data.warnings.map(w=>{const crit=/INSECURE|INGESTION/.test(w);return `<div class="ann ${crit?"crit":""}"><span class="annl"><span class="anndot"></span></span><span class="annt">${esc(w)}</span></div>`;}).join("");
  }
  $("cbay").innerHTML=h;
}
function sect(t,warn){return `<div class="sect ${warn?"warn":""}"><span class="sx"></span><span class="st">${t}</span></div>`;}

function logType(l){if(/error|fail|denied|reject|exception/i.test(l))return"ERROR";if(/^\[(scada|console|modbus-sim|dnp3-sim)/i.test(l))return"SYSTEM";return"RUNTIME";}
function logCls(l){if(/error|fail|denied|reject|exception/i.test(l))return"err";if(/warn|stale|down|offline|notvalid/i.test(l))return"warn";if(/^\[(scada|console|modbus-sim|dnp3-sim)/i.test(l))return"sys";return"";}
async function refreshLog(){
  if(!status.running){$("log").innerHTML='<div class="logline"><span class="lr"></span><span class="lt"></span><span class="lm" style="color:var(--text-dim)">no deployment energized</span></div>';$("rec-state").textContent="idle";return;}
  const r=await api("/api/logs");let lines=r.lines||[]; if(logFilter!=="ALL")lines=lines.filter(l=>logType(l)===logFilter);
  $("rec-state").textContent=lines.length+" lines";
  $("log").innerHTML=lines.map(l=>{const t=l.match(/\b(\d{2}:\d{2}:\d{2})\b/);return `<div class="logline ${logCls(l)}"><span class="lr"></span><span class="lt">${t?t[1]:""}</span><span class="lm">${esc(l)}</span></div>`;}).join("");
  $("log").scrollTop=$("log").scrollHeight;
}
function clk(){return new Date().toTimeString().slice(0,8);}
function tickClock(){const e=$("hclk");if(e)e.textContent=clk();}
async function loadPrecheck(name){const d=await api("/api/precheck?name="+encodeURIComponent(name));prechecks[name]={ok:d.checks.every(c=>c.ok),data:d};}
async function loadAllPrechecks(){await Promise.all(order.map(loadPrecheck));}
async function refresh(){status=await api("/api/status");runs=await api("/api/runs");renderHeader();renderRack();renderBay();refreshLog();}
async function init(){
  deps=await api("/api/deployments"); order=Object.keys(deps).filter(k=>k!=="_comment");
  $("estop").onclick=async()=>{if(confirm("STOP ALL: de-energize the running deployment?")){status=await api("/api/stop",{});await refresh();}};
  $("logfilters").querySelectorAll(".lf").forEach(b=>b.onclick=()=>{logFilter=b.dataset.f;$("logfilters").querySelectorAll(".lf").forEach(x=>x.classList.toggle("on",x===b));refreshLog();});
  await loadAllPrechecks();
  await refresh(); setInterval(tickClock,1000); setInterval(refresh,2500);
}
document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
