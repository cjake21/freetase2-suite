<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREE TASE2 SUITE - Runtime Controller</title>
<style>
/* SUBSTATION SLATE: a clean industrial SCADA lab appliance. Warm graphite,
   equipment channels, reserved state colour, spacing over boxes. */
:root{
  --bg:#171c1a; --panel:#222926; --panel-2:#29312e; --panel-3:#303936;
  --line:#46524d; --line-soft:#303a36;
  --text:#e7e0d2; --muted:#9aa49c; --dim:#66726c;
  --green:#54b86f; --amber:#d6a33a; --red:#d95945; --red-dark:#351c18; --amber-dark:#342914;
  --blackwell:#0d1110;
  --font-ui:"Bahnschrift","Aptos Narrow","Arial Narrow",sans-serif;
  --font-data:"Cascadia Mono","IBM Plex Mono","Consolas",monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:15px;
  display:flex;flex-direction:column;min-height:100vh;}
.data,.command,.path,.port,.timestamp,.value{font-family:var(--font-data);}

/* ===== header (48px) ===== */
.appliance{display:flex;align-items:center;height:48px;flex:0 0 48px;background:var(--panel);
  border-bottom:1px solid var(--blackwell);}
.ident{display:flex;flex-direction:column;justify-content:center;width:190px;flex:0 0 190px;height:100%;
  padding:0 16px;border-right:1px solid var(--line-soft);}
.ident .pn{font-weight:700;font-size:15px;letter-spacing:.09em;color:var(--text);}
.ident .ps{font-size:10px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-top:1px;}
/* context rail: one thin inline sentence */
.statrail{flex:1;display:flex;align-items:center;gap:8px;padding:0 16px;min-width:0;overflow:hidden;
  white-space:nowrap;font-size:13px;color:var(--muted);}
.srlamp{width:9px;height:9px;border-radius:50%;background:#1b211e;box-shadow:inset 0 0 0 1px var(--line);flex:0 0 9px;}
.srlamp.run{background:var(--green);box-shadow:0 0 6px #54b86f77;}
.srlamp.armed{background:var(--amber);box-shadow:0 0 6px #d6a33a77;}
.sr-seg{display:inline-flex;align-items:center;gap:6px;min-width:0;}
.sr-dep{color:var(--text);}
.sr-st{font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
.sr-st.run{color:var(--green);} .sr-st.armed{color:var(--amber);} .sr-st.off{color:var(--dim);}
.sr-k{color:var(--dim);} .sr-dot{color:var(--line);padding:0 1px;}
.sr-prof-i{color:var(--amber);} .sr-prof-h{color:var(--green);}
.sr-clk{margin-left:auto;color:var(--muted);padding-left:8px;}
/* utility actions */
.hlinks{display:flex;align-items:center;gap:8px;padding:0 12px;height:100%;}
.linkbtn{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;
  padding:7px 12px;border:1px solid var(--line-soft);border-radius:2px;background:var(--panel-2);}
.linkbtn:hover{color:var(--text);border-color:var(--line);}
.linkbtn.off{opacity:.35;pointer-events:none;}
.estop{display:flex;align-items:center;padding:0 14px 0 12px;height:100%;border-left:1px solid var(--line-soft);}
.estop button{height:30px;padding:0 16px;border:1px solid #5a261e;border-radius:2px;cursor:pointer;color:#e9cfc8;
  font-family:var(--font-ui);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;
  background:var(--red-dark);}
.estop button:not(:disabled){background:var(--red);color:#fff;border-color:#7a2f24;}
.estop button:disabled{opacity:.55;cursor:not-allowed;}

/* ===== body layout: 7 / 5 ===== */
.bay{display:grid;grid-template-columns:7fr 5fr;flex:1;min-height:0;}
@media(max-width:1040px){.bay{grid-template-columns:1fr;}}
.rack{background:var(--bg);overflow:auto;padding:8px 16px 16px;border-right:1px solid var(--line-soft);}
.rack-lbl{display:flex;justify-content:space-between;align-items:baseline;padding:8px 2px;
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);}
.rack-lbl .data{color:var(--muted);}

/* category headers */
.cat-hd{padding:18px 2px 9px;}
.cat-hd:first-of-type{padding-top:4px;}
.cat-l{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text);}
.cat-d{font-size:12px;color:var(--dim);margin-top:3px;}

/* ===== runtime slots (88px equipment channels) ===== */
.slot{display:grid;grid-template-columns:34px 4px 1fr auto;align-items:stretch;min-height:88px;
  margin-bottom:8px;background:var(--panel);border:1px solid var(--line-soft);border-radius:2px;cursor:pointer;}
.slot:hover{border-color:var(--line);}
.slot.sel{border-color:var(--line);box-shadow:inset 3px 0 0 var(--text);}
.slot.run{background:var(--panel-2);}
.slot-no{display:flex;align-items:center;justify-content:center;font-family:var(--font-data);font-size:16px;color:var(--dim);}
.slot.sel .slot-no{color:var(--text);}
.slot-rail{margin:12px 0;border-radius:1px;background:var(--line);}
.slot.armed .slot-rail{background:var(--amber);}
.slot.run .slot-rail{background:var(--green);}
.slot.fault .slot-rail{background:var(--red);}
.slot-body{min-width:0;display:flex;flex-direction:column;justify-content:center;gap:5px;padding:12px 16px;}
.slot-top{display:flex;align-items:baseline;gap:12px;}
.slot-name{font-size:17px;font-weight:700;letter-spacing:.02em;color:var(--text);}
.slot-state{margin-left:auto;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.slot.armed .slot-state{color:var(--amber);} .slot.run .slot-state{color:var(--green);} .slot.fault .slot-state{color:var(--red);}
.slot-use{font-size:13px;color:var(--muted);}
.slot-meta{font-size:12px;color:var(--dim);letter-spacing:.01em;}
.slot-meta .prof-i{color:var(--amber);} .slot-meta .prof-h{color:var(--green);}
.slot-ctrls{display:flex;flex-direction:column;justify-content:center;gap:7px;padding:0 16px;}

/* buttons */
.opbtn{font-family:var(--font-ui);font-weight:600;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
  min-width:78px;padding:8px 12px;color:var(--text);cursor:pointer;border:1px solid var(--line);border-radius:2px;
  background:var(--panel-3);text-align:center;}
.opbtn:hover{border-color:var(--muted);}
.opbtn:active{transform:translateY(1px);}
.opbtn:disabled{opacity:.4;cursor:not-allowed;}
.opbtn.ghost{background:transparent;color:var(--muted);}
.opbtn.start{color:#dff1e4;background:#2f6e44;border-color:#3c855440;}
.opbtn.stop{color:#f6ddd7;background:#9a3a2c;border-color:#b04a3a40;}

/* ===== process/data tools panel ===== */
.tool{background:var(--panel);border:1px solid var(--line-soft);border-left:3px solid var(--line);
  border-radius:2px;padding:11px 14px;margin-bottom:8px;}
.tool-n{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px;}
.tool-c{display:inline-block;font-size:12px;color:#cfe3d4;background:var(--bg);border:1px solid var(--line-soft);
  border-radius:2px;padding:5px 9px;}
.tool-d{font-size:12px;color:var(--dim);margin-top:6px;}

/* ===== control bay ===== */
.cbay{background:var(--panel);overflow:auto;}
.cbay-empty{color:var(--dim);padding:28px 20px;}
.cbay-hd{padding:16px 18px;border-bottom:1px solid var(--line-soft);}
.cbay-hd .nm{font-size:19px;font-weight:700;letter-spacing:.03em;color:var(--text);}
.cbay-hd .ds{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45;}
.sect{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-weight:600;
  padding:16px 18px 8px;}
.sect.warn{color:var(--amber);}
/* command strip */
.cmdstrip{display:flex;align-items:stretch;margin:0 18px;border:1px solid var(--line-soft);border-radius:2px;
  overflow:hidden;background:var(--bg);}
.cmdstrip .ct{display:flex;align-items:center;background:var(--panel-3);color:var(--muted);font-size:11px;
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:0 12px;}
.cmdstrip .cc{flex:1;font-size:13px;color:#cfe3d4;padding:10px 12px;overflow:auto;white-space:nowrap;}
/* two-column config rows */
.kvs{padding:2px 18px 6px;}
.kv{display:grid;grid-template-columns:96px 1fr;gap:10px;align-items:baseline;padding:5px 0;}
.kv .k{color:var(--dim);font-size:12px;letter-spacing:.04em;text-transform:uppercase;}
.kv .v{color:var(--text);font-size:13px;}
/* compact port blocks */
.ports{display:flex;flex-wrap:wrap;gap:8px;padding:2px 18px 8px;}
.port{display:flex;align-items:baseline;gap:8px;background:var(--bg);border:1px solid var(--line-soft);
  border-radius:2px;padding:6px 10px;}
.port .pk{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);}
.port .pv{font-size:13px;color:var(--text);}
/* process chain */
.procchain{margin:2px 18px 8px;padding:10px 12px;background:var(--bg);border:1px solid var(--line-soft);
  border-radius:2px;font-size:12.5px;line-height:1.7;color:var(--muted);}
.procchain .pc-root{color:var(--text);}
.procchain .pc-b{color:var(--dim);}
.procchain .pc-port{color:#bfe0c8;}
/* health checklist */
.chk{display:grid;grid-template-columns:14px 1fr auto;gap:11px;align-items:center;padding:6px 18px;}
.chk .led{width:11px;height:11px;border-radius:2px;background:var(--line);}
.chk .led.ok{background:var(--green);} .chk .led.bad{background:var(--red);}
.chk .cl{font-size:13px;color:var(--text);} .chk .cd{font-family:var(--font-data);font-size:11.5px;color:var(--dim);}
/* annunciator warnings */
.ann{display:grid;grid-template-columns:4px 1fr;margin:4px 18px;border-radius:2px;overflow:hidden;
  background:var(--amber-dark);}
.ann.crit{background:var(--red-dark);}
.ann .annl{background:var(--amber);} .ann.crit .annl{background:var(--red);}
.ann .annt{padding:9px 13px;font-size:13px;line-height:1.45;color:#ecd9b9;}
.ann.crit .annt{color:#efc9c0;}

/* ===== event recorder ===== */
.recorder{background:var(--bg);border-top:1px solid var(--blackwell);flex:0 0 auto;}
.rec-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;
  border-bottom:1px solid var(--line-soft);}
.rec-hd .rl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);}
.rec-hd .rl.data{color:var(--muted);letter-spacing:.04em;text-transform:none;}
.logfilters{display:inline-flex;border:1px solid var(--line-soft);border-radius:2px;overflow:hidden;}
.lf{font-family:var(--font-ui);font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
  padding:4px 12px;background:var(--panel-2);color:var(--dim);border:none;border-right:1px solid var(--line-soft);cursor:pointer;}
.lf:last-child{border-right:none;} .lf.on{background:var(--panel-3);color:var(--text);}
.log{font-family:var(--font-data);font-size:12px;line-height:1.55;height:150px;overflow:auto;
  background:var(--blackwell);padding:6px 0;}
.logline{display:grid;grid-template-columns:4px 78px 1fr;align-items:center;padding:1px 0;}
.logline .lr{height:100%;background:var(--line-soft);}
.logline.err .lr{background:var(--red);} .logline.warn .lr{background:var(--amber);} .logline.sys .lr{background:var(--line);}
.logline .lt{color:var(--dim);padding-left:12px;}
.logline .lm{padding-right:14px;white-space:pre-wrap;color:#aeb6ae;}
.logline.err .lm{color:#e9a89d;} .logline.warn .lm{color:#e3c486;}
</style>
</head>
<body>
<header class="appliance">
  <div class="ident"><div class="pn">FREE TASE2 SUITE</div><div class="ps">SCADA Runtime Controller</div></div>
  <div class="statrail"><span class="srlamp" id="rt-lamp"></span><span id="rt-ctx" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;"></span></div>
  <div class="hlinks">
    <a id="hmi-link" class="linkbtn off" href="#" target="_blank">SCADA HMI</a>
    <a id="docs-link" class="linkbtn" href="/docs/" target="_blank">Docs</a>
  </div>
  <div class="estop"><button id="estop" disabled>Stop All</button></div>
</header>

<div class="bay">
  <section class="rack">
    <div class="rack-lbl"><span>Runtime Slots</span><span class="data" id="rack-count"></span></div>
    <div id="rack"></div>
  </section>
  <aside class="cbay" id="cbay"><div class="cbay-empty">Select a deployment to open its control bay.</div></aside>
</div>

<section class="recorder">
  <div class="rec-hd">
    <span class="rl">Event Recorder</span>
    <span style="display:flex;align-items:center;gap:10px">
      <span class="logfilters" id="logfilters">
        <button class="lf on" data-f="ALL">All</button><button class="lf" data-f="SYSTEM">System</button>
        <button class="lf" data-f="RUNTIME">Runtime</button><button class="lf" data-f="ERROR">Error</button>
      </span><span class="rl data" id="rec-state">idle</span>
    </span>
  </div>
  <div class="log" id="log"></div>
</section>

<script>
"use strict";
let deps={}, order=[], status={running:false}, runs={}, prechecks={}, sel=null, logFilter="ALL";
const $=id=>document.getElementById(id);
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
async function api(p,b){const o=b?{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}:{};return (await fetch(p,o)).json();}
function scriptFor(d){return ({simulation:"scripts/50_run_hmi.sh",ingestion:"scripts/55_run_scada.sh",scenario:"scripts/56_run_scenario.sh",physics:"scripts/57_run_physics.sh",federation:"scripts/61_run_federation.sh"})[d.mode]||"scripts/55_run_scada.sh";}
function portsFor(d){const p=["TASE.2/"+(d.tase2_port||10502),"HMI/"+(d.http_port||8800)];if((d.sims||[]).includes("modbus"))p.push("MODBUS/1502");if((d.sims||[]).includes("dnp3"))p.push("DNP3/20000");return p;}
function slotState(name){
  if(status.running&&status.name===name) return "run";
  const pc=prechecks[name];
  if(pc&&!pc.ok) return "fault";
  if(sel===name) return "armed";
  return "dark";
}
const STWORD={run:"Running",armed:"Armed",fault:"Faulted",dark:"Dark"};

function renderHeader(){
  const r=status.running, ins=status.security==="insecure";
  $("rt-lamp").className="srlamp "+(r?(ins?"armed":"run"):"");
  const dot=`<span class="sr-dot">&middot;</span>`;
  let segs=[];
  if(r){
    segs.push(`<span class="sr-seg"><span class="sr-dep data">${esc(status.name)}</span><span class="sr-st ${ins?"armed":"run"}">energized</span></span>`);
    segs.push(dot+`<span class="sr-seg">${esc(status.protocol||"")} ${esc(status.mode||"")}</span>`);
    segs.push(dot+`<span class="sr-seg"><span class="sr-k">profile</span><span class="${ins?"sr-prof-i":"sr-prof-h"}">${esc(status.security||"")}</span></span>`);
  } else {
    segs.push(`<span class="sr-seg sr-st off">no deployment energized</span>`);
  }
  segs.push(dot+`<span class="sr-seg"><span class="sr-k">slots</span>${order.length} / ${r?1:0} active</span>`);
  segs.push(`<span class="sr-clk data" id="hclk">${clk()}</span>`);
  $("rt-ctx").innerHTML=segs.join("");
  $("estop").disabled=!r;
  const hmi=$("hmi-link");
  if(r&&status.http_port&&status.hmi_ready){
    hmi.href="http://"+location.hostname+":"+status.http_port+"/";
    hmi.classList.remove("off");hmi.textContent="SCADA HMI";
  } else if(r&&status.http_port){
    hmi.classList.add("off");hmi.textContent="SCADA HMI · starting";
  } else { hmi.classList.add("off");hmi.textContent="SCADA HMI"; }
  $("docs-link").classList.toggle("off",!status.docs_available);
}
const CATS=[
  {id:"demos",   label:"Demos & Training",     desc:"See it work. Synthetic or real data, nothing scripted."},
  {id:"attack",  label:"Attack Scenarios",     desc:"Scripted, repeatable attacks. These feed the dataset and scoring tools."},
  {id:"defense", label:"Defense & Federation", desc:"Encryption, command allowlist, and per-peer bilateral scoping."},
  {id:"hardware",label:"Physical Testbed",     desc:"Real PLCs and RTUs."}
];
function slotHtml(name,i){
  const d=deps[name], s=slotState(name), no=String(i).padStart(2,"0");
  const ports=portsFor(d).map(p=>p.split("/")[1]).join("/");
  return `<div class="slot ${s} ${sel===name?"sel":""}" data-name="${esc(name)}">
    <div class="slot-no">${no}</div>
    <div class="slot-rail"></div>
    <div class="slot-body">
      <div class="slot-top"><span class="slot-name">${esc(name)}</span><span class="slot-state">${STWORD[s]}</span></div>
      ${d.use_when?`<div class="slot-use">${esc(d.use_when)}</div>`:""}
      <div class="slot-meta data">${esc(d.protocol||"ICCP")} &middot; ${esc(d.mode||"")} &middot; <span class="${d.security==="hardened"?"prof-h":"prof-i"}">${esc(d.security||"insecure")}</span> &middot; ${esc((d.config||"").split("/").pop())} &middot; ${esc(ports)}</div>
    </div>
    <div class="slot-ctrls">
      ${s==="run"?`<button class="opbtn stop" data-stop="1">Stop</button>`
                 :`<button class="opbtn start" data-start="${esc(name)}" ${status.running?"disabled":""}>Start</button>`}
      <button class="opbtn ghost" data-logs="${esc(name)}">Logs</button>
    </div>
  </div>`;
}
function toolsHtml(){
  return `<div class="cat-hd"><span class="cat-l">Data &amp; Detection</span><span class="cat-d">After a run: capture, label, and grade. Run these from a terminal.</span></div>
    <div class="tool"><div class="tool-n">Build a labelled dataset</div><span class="tool-c command">sudo ./scripts/58_run_dataset.sh</span><div class="tool-d">Capture a scenario run and label every window benign or malicious with a technique tag.</div></div>
    <div class="tool"><div class="tool-n">Score a detector</div><span class="tool-c command">./scripts/59_score.sh datasets/&lt;run&gt;</span><div class="tool-d">Grade a sensor's alerts against the ground truth: recall per technique, time to detect, false positives.</div></div>`;
}
function renderRack(){
  $("rack-count").textContent=order.length+" slots";
  const byCat={}; order.forEach(n=>{const c=(deps[n]&&deps[n].category)||"other";(byCat[c]=byCat[c]||[]).push(n);});
  const known=CATS.map(c=>c.id);
  const catOrder=known.filter(c=>byCat[c]).concat(Object.keys(byCat).filter(c=>!known.includes(c)));
  let i=0, html="";
  catOrder.forEach(cid=>{
    const meta=CATS.find(c=>c.id===cid)||{label:cid,desc:""};
    html+=`<div class="cat-hd"><span class="cat-l">${esc(meta.label)}</span><span class="cat-d">${esc(meta.desc)}</span></div>`;
    byCat[cid].forEach(name=>{ html+=slotHtml(name, ++i); });
  });
  html+=toolsHtml();
  $("rack").innerHTML=html;
  $("rack").querySelectorAll(".slot").forEach(el=>el.onclick=e=>{if(e.target.closest("button"))return;sel=el.dataset.name;renderRack();renderBay();});
  $("rack").querySelectorAll("button[data-start]").forEach(b=>b.onclick=async()=>{b.disabled=true;status=await api("/api/start",{name:b.dataset.start});sel=b.dataset.start;await loadPrecheck(b.dataset.start);await refresh();});
  $("rack").querySelectorAll("button[data-stop]").forEach(b=>b.onclick=async()=>{b.disabled=true;status=await api("/api/stop",{});await refresh();});
  $("rack").querySelectorAll("button[data-logs]").forEach(b=>b.onclick=()=>{sel=b.dataset.logs;renderRack();renderBay();$("log").scrollIntoView({behavior:"smooth"});});
}
function renderBay(){
  const d=deps[sel];
  if(!d){$("cbay").innerHTML='<div class="cbay-empty">Select a deployment to open its control bay.</div>';$("cbay").dataset.key="";return;}
  const on=status.running&&status.name===sel, pc=prechecks[sel];
  const key=sel+"|"+(on?1:0)+"|"+(pc?pc.ok:"?")+"|"+((status.name===sel&&status.last_run)||runs[sel]||"");
  if($("cbay").dataset.key===key)return; $("cbay").dataset.key=key;
  let h=`<div class="cbay-hd"><div class="nm">${esc(sel)}</div><div class="ds">${esc(d.description||"")}</div></div>`;
  h+=sect("Command");
  h+=`<div class="cmdstrip"><span class="ct">Run</span><span class="cc command">python3 suite/tase2ctl.py run ${esc(sel)}</span></div>`;
  h+=sect("Config");
  h+=`<div class="kvs">
    <div class="kv"><span class="k">Script</span><span class="v path">${esc(scriptFor(d))}</span></div>
    <div class="kv"><span class="k">Config</span><span class="v path">${esc(d.config||"")}</span></div>
    ${d.tags?`<div class="kv"><span class="k">Tags</span><span class="v path">${esc(d.tags)}</span></div>`:""}
    <div class="kv"><span class="k">Profile</span><span class="v" style="color:${d.security==="hardened"?"var(--green)":"var(--amber)"}">${esc((d.security||"").toUpperCase())}</span></div>
    <div class="kv"><span class="k">Last run</span><span class="v timestamp">${esc((status.name===sel&&status.last_run)||runs[sel]||"never")}</span></div>
  </div>`;
  h+=sect("Ports");
  h+=`<div class="ports">`+portsFor(d).map(p=>{const x=p.split("/");return `<div class="port"><span class="pk">${esc(x[0])}</span><span class="pv data">${esc(x[1])}</span></div>`;}).join("")+`</div>`;
  h+=sect("Process chain");
  const hasSims=(d.sims||[]).length>0;
  h+=`<div class="procchain data">`
    +`<div class="pc-root">tase2ctl.py run ${esc(sel)}</div>`
    +`<div><span class="pc-b">&#9500;&#9472;</span> ${esc(scriptFor(d))}</div>`
    +`<div><span class="pc-b">&#9500;&#9472;</span> TASE.2 server <span class="pc-port">:${esc(d.tase2_port||10502)}</span></div>`
    +`<div><span class="pc-b">${hasSims?"&#9500;&#9472;":"&#9492;&#9472;"}</span> HMI bridge <span class="pc-port">:${esc(d.http_port||8800)}</span></div>`
    +(hasSims?`<div><span class="pc-b">&#9492;&#9472;</span> sims <span class="pc-port">${(d.sims.includes("modbus")?":1502 ":"")+(d.sims.includes("dnp3")?":20000":"")}</span></div>`:"")
    +`</div>`;
  h+=sect("Health");
  if(pc){ h+=pc.data.checks.map(c=>`<div class="chk"><span class="led ${c.ok?"ok":"bad"}"></span><span class="cl">${esc(c.label)}</span><span class="cd">${esc(c.detail)}</span></div>`).join(""); }
  else h+=`<div class="chk"><span class="led bad"></span><span class="cl">checks pending</span><span class="cd"></span></div>`;
  if(pc&&pc.data.warnings.length){
    h+=sect("Warnings",true);
    h+=pc.data.warnings.map(w=>{const crit=/INSECURE|INGESTION/.test(w);return `<div class="ann ${crit?"crit":""}"><span class="annl"></span><span class="annt">${esc(w)}</span></div>`;}).join("");
  }
  $("cbay").innerHTML=h;
}
function sect(t,warn){return `<div class="sect ${warn?"warn":""}">${t}</div>`;}

function logType(l){if(/error|fail|denied|reject|exception/i.test(l))return"ERROR";if(/^\[(scada|console|modbus-sim|dnp3-sim|fed|physics|scenario)/i.test(l))return"SYSTEM";return"RUNTIME";}
function logCls(l){if(/error|fail|denied|reject|exception/i.test(l))return"err";if(/warn|stale|down|offline|notvalid|overload/i.test(l))return"warn";if(/^\[(scada|console|modbus-sim|dnp3-sim|fed|physics|scenario)/i.test(l))return"sys";return"";}
async function refreshLog(){
  if(!status.running){$("log").innerHTML='<div class="logline"><span class="lr"></span><span class="lt"></span><span class="lm" style="color:var(--dim)">no deployment energized</span></div>';$("rec-state").textContent="idle";return;}
  const r=await api("/api/logs");let lines=r.lines||[]; if(logFilter!=="ALL")lines=lines.filter(l=>logType(l)===logFilter);
  $("rec-state").textContent=lines.length+" lines";
  $("log").innerHTML=lines.map(l=>{const t=l.match(/\b(\d{2}:\d{2}:\d{2})\b/);return `<div class="logline ${logCls(l)}"><span class="lr"></span><span class="lt">${t?t[1]:""}</span><span class="lm">${esc(l)}</span></div>`;}).join("");
  $("log").scrollTop=$("log").scrollHeight;
}
function clk(){return new Date().toTimeString().slice(0,8);}
function tickClock(){const e=$("hclk");if(e)e.textContent=clk();}
async function loadPrecheck(name){const d=await api("/api/precheck?name="+encodeURIComponent(name));prechecks[name]={ok:d.checks.every(c=>c.ok),data:d};}
async function loadAllPrechecks(){await Promise.all(order.map(loadPrecheck));}
async function refresh(){status=await api("/api/status");runs=await api("/api/runs");renderHeader();renderRack();renderBay();refreshLog();}
async function init(){
  deps=await api("/api/deployments"); order=Object.keys(deps).filter(k=>k!=="_comment");
  $("estop").onclick=async()=>{if(confirm("STOP ALL: de-energize the running deployment?")){status=await api("/api/stop",{});await refresh();}};
  $("logfilters").querySelectorAll(".lf").forEach(b=>b.onclick=()=>{logFilter=b.dataset.f;$("logfilters").querySelectorAll(".lf").forEach(x=>x.classList.toggle("on",x===b));refreshLog();});
  await loadAllPrechecks();
  await refresh(); setInterval(tickClock,1000); setInterval(refresh,2500);
}
document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
